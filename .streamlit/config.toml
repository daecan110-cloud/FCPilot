[theme]
primaryColor = "#4f46e5"
backgroundColor = "#f8f9fc"
secondaryBackgroundColor = "#ffffff"
textColor = "#1a1a2e"
font = "sans serif"

[server]
maxUploadSize = 10
enableStaticServing = true

[client]
toolbarMode = "viewer"
showSidebarNavigation = false
# 프로덕션: 에러 스택 트레이스 숨김 (개발자 모드로 들어가도 내부 에러 코드 노출 방지)
showErrorDetails = false
